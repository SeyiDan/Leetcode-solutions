name: Safe Sync LeetCode

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ensure write perms for commits

    steps:
      - uses: actions/checkout@v3

      - name: Check Secrets
        run: |
          if [[ -z "${{ secrets.LEETCODE_SESSION }}" || -z "${{ secrets.LEETCODE_CSRF_TOKEN }}" ]]; then
            echo "❌ LEETCODE_SESSION or LEETCODE_CSRF_TOKEN is missing"
            exit 1
          fi
          echo "✅ Secrets exist."

      - name: Test LeetCode Cookies (lightweight)
        run: |
          set -e
          resp=$(curl -s -H "Cookie: LEETCODE_SESSION=${{ secrets.LEETCODE_SESSION }}; csrftoken=${{ secrets.LEETCODE_CSRF_TOKEN }}" https://leetcode.com/graphql/ -H "x-csrftoken: ${{ secrets.LEETCODE_CSRF_TOKEN }}" -H "content-type: application/json" --data '{"query":"query { userStatus { username } }"}')
          if [[ "$resp" == *"username"* ]]; then
            echo "✅ Cookie auth OK"
          else
            echo "❌ Cookie auth failed; refresh LEETCODE_SESSION/CSRFTOKEN"
            echo "$resp" | head -c 500
            exit 1
          fi

      - name: Sync LeetCode Solutions
        uses: SeyiDan/leetcode-sync@master
        with:
          github-token: ${{ github.token }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          destination-folder: difficulty/topic
          verbose: true
          commit-header: "[LeetCode Sync]"

name: Test LeetCode Secrets

on:
  workflow_dispatch:  # Manual run only

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v3

      - name: Test secrets
        run: |
          if [[ -z "${{ secrets.LEETCODE_SESSION }}" ]] || [[ -z "${{ secrets.LEETCODE_CSRF_TOKEN }}" ]]; then
            echo "❌ Secrets are missing!"
            exit 1
          fi

          echo "✅ Secrets exist!"

      - name: Test LeetCode login
        run: |
          # Use curl to check login status without revealing cookies
          response=$(curl -s -H "Cookie: LEETCODE_SESSION=${{ secrets.LEETCODE_SESSION }}; csrftoken=${{ secrets.LEETCODE_CSRF_TOKEN }}" https://leetcode.com/api/problems/algorithms/)
          if [[ $response == *"stat_status_pairs"* ]]; then
            echo "✅ Login successful. Secrets are valid."
          else
            echo "❌ Login failed. Check your cookies."
            exit 1
          fi
